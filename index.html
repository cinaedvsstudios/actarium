<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d13" />
  <title>Actarium</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/reminder-alarms.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.ACTARIUM_API = 'https://script.google.com/macros/s/AKfycbzC47dw83euJ_T45zh0LQmtAivEHK7G_V5aHTYLYw2VhnMDAAVK0UFCF3tv5nsWM74q/exec';
    window.ACTARIUM_REMINDER_API = window.ACTARIUM_API;
  </script>
  <script src="js/syncStatusView.js"></script>
  <script src="js/apiEndpointBridge.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    (() => {
      let routineData = null;
      let routineChecked = false;

      const read = (row, key) => {
        const found = Object.keys(row || {}).find(name => String(name).toLowerCase() === key.toLowerCase());
        return found ? row[found] : '';
      };

      const currentDay = () => {
        const names = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const visible = String(document.querySelector('.day-name')?.textContent || '').toLowerCase();
        return names.find(name => visible.startsWith(name)) || names[new Date().getDay()];
      };

      const findContext = data => {
        const day = currentDay();
        for (const row of Array.isArray(data?.routine) ? data.routine : []) {
          const title = String(read(row, day) || '').trim();
          if (title) return { emoji: read(row, 'emoji') || '💼', title };
        }
        const shortDay = day.slice(0, 3);
        for (const row of Array.isArray(data?.schedule) ? data.schedule : []) {
          const days = String(read(row, 'days') || '').toLowerCase();
          if (days.includes(day) || days.split(/[^a-z]+/).includes(shortDay)) {
            return { emoji: read(row, 'emoji') || '💼', title: String(read(row, 'title') || 'Scheduled item') };
          }
        }
        return null;
      };

      fetch(`${window.ACTARIUM_API}?action=bootstrap`, { cache: 'no-store' })
        .then(response => response.ok ? response.json() : null)
        .then(data => {
          routineChecked = true;
          routineData = data?.success === false ? null : data;
        })
        .catch(() => { routineChecked = true; routineData = null; });

      window.setInterval(() => {
        const version = document.querySelector('.version');
        if (version) version.textContent = 'v3.11';

        const pill = document.querySelector('.context-pill');
        if (!pill || !routineChecked) return;

        const liveContext = findContext(routineData);
        if (liveContext) {
          pill.textContent = `${liveContext.emoji} ${liveContext.title}`;
          pill.classList.remove('routine-not-syncing');
        } else {
          pill.textContent = '⚠️ ROUTINE NOT SYNCING';
          pill.classList.add('routine-not-syncing');
        }
      }, 150);
    })();
  </script>
</body>
</html>
